<template>
    <div class="slds-grid slds-grid_align-end slds-gutters_xx-small">
        <lightning-button
            label="Save Config"
            icon-name="utility:save"
            variant="neutral"
            onclick={handleSaveClick}>
        </lightning-button>

        <lightning-button-menu
            alternative-text="Load saved configs"
            icon-name="utility:open_folder"
            variant="border-filled"
            onselect={handleLoadSelect}
            class="slds-m-left_xx-small">
            <template lwc:if={hasSavedConfigs}>
                <template for:each={savedConfigs} for:item="cfg">
                    <lightning-menu-item
                        key={cfg.id}
                        value={cfg.id}
                        label={cfg.label}>
                    </lightning-menu-item>
                </template>
            </template>
            <template lwc:else>
                <lightning-menu-item
                    value="none"
                    label="No saved configs"
                    disabled>
                </lightning-menu-item>
            </template>
        </lightning-button-menu>
    </div>
</template>

<template>
    <div class="empty-state slds-p-around_large">
        <div class="slds-text-align_center full-width">

            <!-- Hero -->
            <div class="hero slds-m-bottom_large">
                <h1 class="hero-heading slds-m-bottom_x-small">See Where Your Data Goes</h1>
                <p class="hero-sub">
                    Turn any Salesforce object into a visual flow map.<br>
                    See the most common paths, find where records drop off,<br>
                    and understand how volume splits at every stage.
                </p>
            </div>

            <!-- What you'll discover -->
            <h2 class="section-heading slds-m-bottom_small">What you'll discover</h2>
            <div class="slds-grid slds-gutters slds-grid_align-center slds-wrap slds-m-bottom_large">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="discover-card slds-p-around_medium">
                        <div class="discover-icon-ring">
                            <lightning-icon icon-name="utility:trending" size="small"></lightning-icon>
                        </div>
                        <h3 class="discover-title">Find the Most Common Paths</h3>
                        <p class="discover-desc">
                            Instantly see which routes your records
                            take most often through each stage.
                        </p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="discover-card slds-p-around_medium">
                        <div class="discover-icon-ring warn-ring">
                            <lightning-icon icon-name="utility:warning" size="small"></lightning-icon>
                        </div>
                        <h3 class="discover-title">Spot Where Things Drop Off</h3>
                        <p class="discover-desc">
                            Identify the exact stages where records
                            fall out of the flow so you can take action.
                        </p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="discover-card slds-p-around_medium">
                        <div class="discover-icon-ring trace-ring">
                            <lightning-icon icon-name="utility:search" size="small"></lightning-icon>
                        </div>
                        <h3 class="discover-title">Trace Any Record</h3>
                        <p class="discover-desc">
                            Follow a single record step-by-step through
                            its entire journey from start to finish.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Getting started -->
            <h2 class="section-heading slds-m-bottom_small">Getting started is easy</h2>
            <div class="slds-grid slds-gutters slds-grid_align-center slds-wrap slds-m-bottom_large">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="step-card slds-p-around_medium slds-text-align_center">
                        <span class="step-number">1</span>
                        <h3 class="step-title">Pick your data</h3>
                        <p class="step-desc">
                            Choose any Salesforce object you have access to &mdash;
                            Opportunities, Cases, Leads, or anything else.
                        </p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="step-card slds-p-around_medium slds-text-align_center">
                        <span class="step-number">2</span>
                        <h3 class="step-title">Choose the stages</h3>
                        <p class="step-desc">
                            Select the fields that represent each step
                            in your flow, like Status, Stage, or Type.
                        </p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="step-card slds-p-around_medium slds-text-align_center">
                        <span class="step-number">3</span>
                        <h3 class="step-title">Generate &amp; explore</h3>
                        <p class="step-desc">
                            Hit the button and your flow diagram appears.
                            Click any part of it to drill deeper.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Primary CTA -->
            <div class="cta-section slds-m-bottom_large">
                <lightning-button
                    label="Get Started"
                    variant="brand"
                    onclick={handleStart}
                    class="cta-btn">
                </lightning-button>
            </div>

            <!-- Saved configurations -->
            <template lwc:if={hasSavedConfigs}>
                <div class="saved-configs-section slds-box slds-p-around_medium slds-text-align_left">
                    <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_small">
                        <lightning-icon icon-name="utility:open_folder" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <h3 class="slds-text-title_caps">Saved Configurations</h3>
                    </div>
                    <ul class="slds-has-dividers_bottom-space">
                        <template for:each={savedConfigs} for:item="cfg">
                            <li key={cfg.id}
                                class="config-tile slds-item slds-p-around_small"
                                data-id={cfg.id}
                                onclick={handleConfigSelect}>
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="utility:open" size="xx-small" class="slds-m-right_small tile-icon"></lightning-icon>
                                    <div>
                                        <p class="slds-text-title_bold">{cfg.label}</p>
                                        <p class="slds-text-body_small slds-text-color_weak">{cfg.subtitle}</p>
                                    </div>
                                </div>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>

        </div>
    </div>
</template>

<template>
    <div class="empty-state slds-p-around_large slds-align_absolute-center">
        <div class="slds-text-align_center full-width">
            <lightning-icon icon-name="utility:strategy" size="large" class="slds-m-bottom_medium"></lightning-icon>
            <h2 class="slds-text-heading_medium slds-m-bottom_x-small">Build a Sankey Flow Diagram</h2>
            <p class="slds-text-body_regular slds-text-color_weak slds-m-bottom_medium">
                Visualize how records move through stages in your Salesforce data &mdash;
                find the most common paths, spot where things drop off, and understand how volume splits.
            </p>

            <!-- How it works -->
            <div class="how-it-works slds-m-bottom_medium">
                <div class="slds-grid slds-gutters slds-grid_align-center slds-wrap">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                        <div class="step-card slds-text-align_center slds-p-around_small">
                            <span class="step-number">1</span>
                            <lightning-icon icon-name="utility:database" size="x-small" class="slds-m-top_xx-small step-icon"></lightning-icon>
                            <p class="slds-text-body_regular slds-m-top_xx-small step-label">Pick your data source</p>
                            <p class="slds-text-body_small slds-text-color_weak">Any Salesforce object you have access to</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                        <div class="step-card slds-text-align_center slds-p-around_small">
                            <span class="step-number">2</span>
                            <lightning-icon icon-name="utility:steps" size="x-small" class="slds-m-top_xx-small step-icon"></lightning-icon>
                            <p class="slds-text-body_regular slds-m-top_xx-small step-label">Select the stages</p>
                            <p class="slds-text-body_small slds-text-color_weak">Choose fields that represent each step in the flow</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                        <div class="step-card slds-text-align_center slds-p-around_small">
                            <span class="step-number">3</span>
                            <lightning-icon icon-name="utility:play" size="x-small" class="slds-m-top_xx-small step-icon"></lightning-icon>
                            <p class="slds-text-body_regular slds-m-top_xx-small step-label">Generate &amp; explore</p>
                            <p class="slds-text-body_small slds-text-color_weak">Interact with the diagram to drill into any path</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- What you'll see -->
            <div class="benefits-section slds-m-bottom_medium">
                <div class="slds-grid slds-gutters_small slds-grid_align-center slds-wrap">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_xx-small">
                        <div class="benefit-item">
                            <lightning-icon icon-name="utility:routing_offline" size="xx-small" class="benefit-icon"></lightning-icon>
                            <span class="slds-text-body_small"><strong>See volume splits</strong> &mdash; how records branch across stages</span>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_xx-small">
                        <div class="benefit-item">
                            <lightning-icon icon-name="utility:warning" size="xx-small" class="benefit-icon"></lightning-icon>
                            <span class="slds-text-body_small"><strong>Spot drop-offs</strong> &mdash; where records fall out of the flow</span>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_xx-small">
                        <div class="benefit-item">
                            <lightning-icon icon-name="utility:trace" size="xx-small" class="benefit-icon"></lightning-icon>
                            <span class="slds-text-body_small"><strong>Trace records</strong> &mdash; follow a single record through its journey</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Primary CTA -->
            <div class="slds-m-bottom_medium">
                <lightning-button
                    label="Create New Flow Diagram"
                    variant="brand"
                    onclick={handleStart}
                    class="create-btn">
                </lightning-button>
            </div>

            <!-- Saved configurations -->
            <template lwc:if={hasSavedConfigs}>
                <div class="saved-configs-section slds-box slds-p-around_medium slds-text-align_left">
                    <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_small">
                        <lightning-icon icon-name="utility:open_folder" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <h3 class="slds-text-title_caps">Saved Configurations</h3>
                    </div>
                    <ul class="slds-has-dividers_bottom-space">
                        <template for:each={savedConfigs} for:item="cfg">
                            <li key={cfg.id}
                                class="config-tile slds-item slds-p-around_small"
                                data-id={cfg.id}
                                onclick={handleConfigSelect}>
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="utility:open" size="xx-small" class="slds-m-right_small tile-icon"></lightning-icon>
                                    <div>
                                        <p class="slds-text-title_bold">{cfg.label}</p>
                                        <p class="slds-text-body_small slds-text-color_weak">{cfg.subtitle}</p>
                                    </div>
                                </div>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>

        </div>
    </div>
</template>

<template>
    <div class="empty-state slds-p-horizontal_large slds-p-bottom_large">
        <div class="slds-text-align_center full-width">

            <!-- Hero -->
            <div class="hero slds-m-bottom_medium">
                <h1 class="hero-heading slds-m-bottom_x-small">Map Any Salesforce Process — Instantly</h1>
                <p class="hero-sub">
                    Turn any object into a live flow diagram. See where records drop off,
                    find the most common paths, and trace any individual record.
                    No code, no setup.
                </p>
                <div class="cta-section slds-m-top_medium">
                    <lightning-button
                        label="Build Your First Diagram"
                        variant="brand"
                        onclick={handleStart}
                        class="cta-btn">
                    </lightning-button>
                </div>
            </div>

            <!-- What you'll discover -->
            <h2 class="section-heading slds-m-bottom_small">What you'll discover</h2>
            <div class="slds-grid slds-gutters slds-grid_align-center slds-wrap slds-m-bottom_large">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="discover-card slds-p-around_medium">
                        <div class="discover-icon-ring">
                            <lightning-icon icon-name="utility:trending" size="small"></lightning-icon>
                        </div>
                        <h3 class="discover-title">See the Most Common Paths</h3>
                        <p class="discover-desc">
                            Instantly see which routes your records take
                            most often — and which path leads to the best outcomes.
                        </p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="discover-card slds-p-around_medium">
                        <div class="discover-icon-ring warn-ring">
                            <lightning-icon icon-name="utility:warning" size="small"></lightning-icon>
                        </div>
                        <h3 class="discover-title">Pinpoint Every Drop-Off</h3>
                        <p class="discover-desc">
                            Find the exact stage where volume disappears from
                            your process so you can take targeted action.
                        </p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="discover-card slds-p-around_medium">
                        <div class="discover-icon-ring trace-ring">
                            <lightning-icon icon-name="utility:search" size="small"></lightning-icon>
                        </div>
                        <h3 class="discover-title">Trace Any Individual Record</h3>
                        <p class="discover-desc">
                            Click any record to see its complete journey,
                            step by step, highlighted across the full diagram.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Getting started -->
            <h2 class="section-heading slds-m-bottom_small">Getting started is easy</h2>
            <div class="slds-grid slds-gutters slds-grid_align-center slds-wrap slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="step-card slds-p-around_medium slds-text-align_center">
                        <span class="step-number">1</span>
                        <h3 class="step-title">Pick an Object</h3>
                        <p class="step-desc">
                            Any queryable Salesforce object works &mdash;
                            Opportunities, Cases, custom objects, and more.
                        </p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="step-card slds-p-around_medium slds-text-align_center">
                        <span class="step-number">2</span>
                        <h3 class="step-title">Select Your Stages</h3>
                        <p class="step-desc">
                            Choose the fields that represent each checkpoint
                            in your process, like Stage, Status, or Type.
                        </p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                    <div class="step-card slds-p-around_medium slds-text-align_center">
                        <span class="step-number">3</span>
                        <h3 class="step-title">Generate &amp; Explore</h3>
                        <p class="step-desc">
                            Your diagram appears in seconds.
                            Click any node or link to drill deeper into the data.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Saved configurations -->
            <template lwc:if={hasSavedConfigs}>
                <div class="saved-configs-section slds-box slds-p-around_medium slds-text-align_left slds-m-top_small">
                    <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_small">
                        <lightning-icon icon-name="utility:open_folder" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <h3 class="slds-text-title_caps">Saved Configurations</h3>
                    </div>
                    <ul class="slds-has-dividers_bottom-space">
                        <template for:each={savedConfigs} for:item="cfg">
                            <li key={cfg.id}
                                class="config-tile slds-item slds-p-around_small"
                                data-id={cfg.id}
                                onclick={handleConfigSelect}>
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon icon-name="utility:open" size="xx-small" class="slds-m-right_small tile-icon"></lightning-icon>
                                    <div>
                                        <p class="slds-text-title_bold">{cfg.label}</p>
                                        <p class="slds-text-body_small slds-text-color_weak">{cfg.subtitle}</p>
                                    </div>
                                </div>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>

        </div>
    </div>
</template>

<template>
    <div class="slds-form-element">
        <label class="slds-form-element__label slds-text-title_bold">
            Salesforce Object
        </label>

        <div class="slds-combobox_container">
            <div
                class={comboboxClass}
                aria-expanded={ariaExpanded}
                aria-haspopup="listbox"
                role="combobox">
                <div class="slds-combobox__form-element" role="none">
                    <input
                        class="slds-input slds-combobox__input"
                        type="text"
                        role="textbox"
                        autocomplete="off"
                        placeholder="Search Salesforce objects..."
                        value={displayValue}
                        aria-autocomplete="list"
                        aria-controls="object-listbox"
                        oninput={handleInput}
                        onfocus={handleFocus}
                        onblur={handleBlur} />
                </div>

                <template lwc:if={showDropdown}>
                    <div
                        id="object-listbox"
                        class="slds-dropdown slds-dropdown_fluid"
                        role="listbox">
                        <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                            <template for:each={filteredOptions} for:item="option">
                                <li
                                    key={option.value}
                                    class="slds-listbox__item"
                                    role="presentation">
                                    <div
                                        class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small option-row"
                                        role="option"
                                        data-value={option.value}
                                        data-label={option.label}
                                        onmousedown={handleOptionSelect}>
                                        <span class="slds-media__body">
                                            <span class="slds-truncate" title={option.label}>
                                                {option.label}
                                            </span>
                                        </span>
                                        <template lwc:if={option.countLabel}>
                                            <span class="count-badge" title={option.countTitle}>
                                                {option.countLabel}
                                            </span>
                                        </template>
                                    </div>
                                </li>
                            </template>

                            <template lwc:if={showNoResults}>
                                <li class="slds-listbox__item" role="presentation">
                                    <div
                                        class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small slds-text-color_weak"
                                        role="option">
                                        <span class="slds-media__body">
                                            <span class="slds-truncate" title="No objects found">
                                                No objects found
                                            </span>
                                        </span>
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </div>
                </template>
            </div>
        </div>

        <template lwc:if={selectedObject}>
            <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                Selected: {selectedObjectLabel}
            </p>
        </template>

        <template lwc:if={error}>
            <p class="slds-text-color_error slds-text-body_small slds-m-top_xx-small">
                Unable to load objects. Check permissions or try again.
            </p>
        </template>
    </div>
</template>

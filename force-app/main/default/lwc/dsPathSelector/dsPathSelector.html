<template>
    <div class="slds-m-top_x-small">
        <div class="slds-is-relative">
            <lightning-dual-listbox
                name="pathFields"
                label="Path Fields (order matters)"
                source-label="Available Fields"
                selected-label="Selected Steps"
                options={pathFieldOptions}
                value={internalSelected}
                onchange={handlePathChange}
                min="2"
                required>
            </lightning-dual-listbox>
            <template lwc:if={loadingStats}>
                <lightning-spinner size="small" alternative-text="Loading field stats"></lightning-spinner>
            </template>
        </div>

        <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
            Stats from sampled records — Recent (last 90 days), Older (1 yr+) population, and distinct value count.
        </p>

        <template lwc:if={showMinWarning}>
            <p class="slds-text-color_error slds-text-body_small slds-m-top_xx-small">
                Select at least 2 path fields to define a flow.
            </p>
        </template>

        <div class="slds-grid slds-gutters slds-wrap slds-m-top_small">
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <lightning-combobox
                    name="nullHandling"
                    label="Null Handling"
                    value={internalNullHandling}
                    options={nullHandlingOptions}
                    onchange={handleNullChange}>
                </lightning-combobox>
            </div>

            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                <lightning-combobox
                    name="recordIdField"
                    label="Record ID Field"
                    value={internalRecordIdField}
                    options={idFieldOptions}
                    onchange={handleIdFieldChange}>
                </lightning-combobox>
            </div>
        </div>
    </div>
</template>

<template>
    <div class="slds-m-top_x-small">
        <!-- Date range quick filter -->
        <div class="slds-m-bottom_small">
            <lightning-combobox
                name="dateRange"
                label="Date Quick Filter"
                placeholder="Optional date range..."
                value={selectedDateRange}
                options={dateRangeOptions}
                onchange={handleDateRangeChange}>
            </lightning-combobox>
        </div>

        <!-- Filter rows — Field + Operator + Value -->
        <template for:each={filterRows} for:item="row">
            <div key={row.id} class="slds-grid slds-gutters_x-small slds-wrap slds-m-bottom_x-small filter-row">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                    <lightning-combobox
                        name="field"
                        label="Field"
                        variant="label-hidden"
                        placeholder="Field..."
                        value={row.field}
                        options={fieldOptions}
                        data-row-id={row.id}
                        onchange={handleFieldChange}>
                    </lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
                    <lightning-combobox
                        name="operator"
                        label="Operator"
                        variant="label-hidden"
                        placeholder="Operator..."
                        value={row.operator}
                        options={operatorOptions}
                        data-row-id={row.id}
                        onchange={handleOperatorChange}>
                    </lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                    <lightning-input
                        label="Value"
                        variant="label-hidden"
                        placeholder="Value..."
                        value={row.value}
                        data-row-id={row.id}
                        onchange={handleValueChange}>
                    </lightning-input>
                </div>
                <div class="slds-col slds-shrink-none slds-medium-size_1-of-12 slds-text-align_center filter-delete-col">
                    <lightning-button-icon
                        icon-name="utility:delete"
                        alternative-text="Remove filter"
                        variant="bare"
                        data-row-id={row.id}
                        onclick={handleRemoveRow}>
                    </lightning-button-icon>
                </div>
            </div>
        </template>

        <div class="slds-grid slds-grid_align-spread slds-m-top_small">
            <lightning-button
                label="Add Filter"
                icon-name="utility:add"
                variant="neutral"
                onclick={handleAddRow}>
            </lightning-button>

            <lightning-button
                label={previewLabel}
                icon-name="utility:preview"
                variant="neutral"
                onclick={handlePreviewCount}
                disabled={isPreviewDisabled}>
            </lightning-button>
        </div>

        <template lwc:if={recordCount}>
            <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                Matching records: {recordCount}
            </p>
        </template>
    </div>
</template>

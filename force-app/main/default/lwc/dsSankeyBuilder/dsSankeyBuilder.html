<template>
    <lightning-card title="Sankey Builder" icon-name="utility:strategy">
        <div slot="actions">
            <c-ds-saved-configs
                lwc:if={hasData}
                config={configForSave}
                onsaveconfig={handleSaveConfig}
                onsaveerror={handleSaveError}
                onconfigloaded={handleConfigLoaded}>
            </c-ds-saved-configs>
            <lightning-button
                lwc:if={hasData}
                label="Reset"
                icon-name="utility:refresh"
                onclick={handleResetAll}
                variant="neutral"
                class="slds-m-left_x-small">
            </lightning-button>
        </div>

        <!-- Empty state shown before configuration -->
        <template lwc:if={showEmptyState}>
            <c-ds-empty-state onstart={handleStart} onconfigloaded={handleConfigLoaded}></c-ds-empty-state>
        </template>

        <!-- ═══ TOP ZONE: Chart area (loading / chart / placeholder) ═══ -->
        <template lwc:if={state.ui.loading}>
            <div class="chart-placeholder slds-p-around_large slds-m-horizontal_medium slds-m-top_small">
                <lightning-spinner alternative-text="Loading Sankey data" size="medium"></lightning-spinner>
                <p class="slds-text-body_regular slds-text-color_weak slds-m-top_medium">
                    Building your Sankey diagram&hellip;
                </p>
            </div>
        </template>
        <template lwc:elseif={hasData}>
            <div class="slds-grid slds-wrap" data-id="chart-area">
                <div class={chartColumnClass}>
                    <c-ds-trace-panel
                        mode={state.ui.mode}
                        records={state.data.records}
                        steps={state.data.stepColumns}
                        step-labels={stepLabels}
                        selected-record-id={state.ui.selectedRecord}
                        trace-step={state.ui.traceStep}
                        flow-step-idx={state.ui.flowStepIdx}
                        flow-trace-value={state.ui.flowTraceValue}
                        kpis={flowTraceKpis}
                        onmodechange={handleModeChange}
                        onrecordselect={handleRecordSelect}
                        onflowstepchange={handleFlowStepChange}
                        onflowvaluechange={handleFlowValueChange}
                        ontracenext={handleTraceNext}
                        ontraceprev={handleTracePrev}
                        ontracereset={handleTraceReset}
                        onopenrecord={handleOpenRecord}>
                    </c-ds-trace-panel>

                    <c-ds-sankey-chart
                        nodes={state.data.nodes}
                        links={state.data.links}
                        records={state.data.records}
                        steps={state.data.stepColumns}
                        step-labels={stepLabels}
                        metric={state.ui.metricDisplay}
                        mode={state.ui.mode}
                        selected-record-id={state.ui.selectedRecord}
                        flow-step-idx={state.ui.flowStepIdx}
                        flow-trace-value={state.ui.flowTraceValue}
                        trace-step={state.ui.traceStep}
                        onnodeclick={handleNodeClick}
                        onopenrecord={handleOpenRecord}>
                    </c-ds-sankey-chart>
                </div>

                <div class={insightsColumnClass}>
                    <c-ds-insights-panel
                        lwc:if={showInsights}
                        kpis={state.data.kpis}
                        top-paths={state.data.topPaths}
                        ontogglepanel={handleToggleInsights}>
                    </c-ds-insights-panel>
                </div>
            </div>

            <template lwc:if={hideInsights}>
                <div class="slds-text-align_right slds-p-right_medium slds-p-bottom_small">
                    <lightning-button
                        label="Show Insights"
                        icon-name="utility:graph"
                        variant="neutral"
                        onclick={handleToggleInsights}>
                    </lightning-button>
                </div>
            </template>
        </template>
        <template lwc:elseif={showChartPlaceholder}>
            <div class="chart-placeholder slds-p-around_large slds-m-horizontal_medium slds-m-top_small">
                <lightning-icon icon-name="utility:strategy" size="large" class="placeholder-icon"></lightning-icon>
                <h2 class="slds-text-heading_small slds-m-top_medium slds-m-bottom_x-small">
                    Your Sankey diagram will appear here
                </h2>
                <p class="slds-text-body_regular slds-text-color_weak">
                    Configure the steps below, then click Generate Diagram to visualize your flows.
                </p>
            </div>
        </template>

        <!-- Truncation warning -->
        <template lwc:if={showTruncationWarning}>
            <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-horizontal_medium slds-m-top_small" role="alert">
                <span class="slds-assistive-text">warning</span>
                Dataset was limited to {datasetLimit} records. Apply filters to narrow your results.
            </div>
        </template>

        <!-- ═══ BOTTOM ZONE: Collapsible Configuration ═══ -->

        <template lwc:if={showConfigPanel}>
            <div class="config-section slds-m-horizontal_medium slds-m-top_small slds-m-bottom_medium">
                <!-- Collapsible header -->
                <div class="config-header" onclick={handleToggleConfig}>
                    <lightning-icon
                        icon-name={configToggleIcon}
                        size="xx-small"
                        class="slds-m-right_x-small">
                    </lightning-icon>
                    <h3 class="slds-text-title_caps config-header-title">Configuration</h3>
                    <template lwc:if={configCollapsedHint}>
                        <span class="slds-text-body_small slds-text-color_weak slds-m-left_small">
                            Click to expand and adjust settings
                        </span>
                    </template>
                </div>

                <!-- Configuration body (collapsible) -->
                <template lwc:if={configExpanded}>
                    <div class="config-body">
                        <!-- Progress indicator -->
                        <div class="slds-p-top_small slds-p-bottom_x-small">
                            <lightning-progress-indicator current-step={currentStep} type="path" variant="base">
                                <lightning-progress-step label="Choose Data" value="object"></lightning-progress-step>
                                <lightning-progress-step label="Pick Metric" value="metric"></lightning-progress-step>
                                <lightning-progress-step label="Set Flow Steps" value="path"></lightning-progress-step>
                                <lightning-progress-step label="Filter (optional)" value="filters"></lightning-progress-step>
                                <lightning-progress-step label="Generate" value="generate"></lightning-progress-step>
                            </lightning-progress-indicator>
                        </div>

                        <div class="slds-p-top_small">
                            <div class="slds-grid slds-gutters slds-wrap">
                                <!-- Object Picker -->
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                    <p class="help-text slds-m-bottom_xx-small">
                                        Choose which Salesforce object contains the records you want to visualize.
                                    </p>
                                    <c-ds-object-picker
                                        selected-object={state.config.objectApiName}
                                        onobjectselect={handleObjectSelect}>
                                    </c-ds-object-picker>
                                </div>

                                <!-- Metric Selector -->
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_small">
                                    <template lwc:if={state.config.objectApiName}>
                                        <p class="help-text slds-m-bottom_xx-small">
                                            Decide how to measure flows &mdash; count records or sum a numeric field like Amount.
                                        </p>
                                        <c-ds-metric-selector
                                            object-api-name={state.config.objectApiName}
                                            metric-type={state.config.metricType}
                                            metric-field={state.config.metricField}
                                            onmetricchange={handleMetricChange}>
                                        </c-ds-metric-selector>
                                    </template>
                                </div>
                            </div>

                            <!-- Path Selector -->
                            <template lwc:if={state.config.objectApiName}>
                                <p class="help-text slds-m-bottom_xx-small slds-m-top_small">
                                    Select 2 or more fields that represent stages in your flow.
                                    The order you choose becomes left-to-right columns in the diagram.
                                </p>
                                <c-ds-path-selector
                                    object-api-name={state.config.objectApiName}
                                    selected-fields={state.config.pathFields}
                                    null-handling={state.config.nullHandling}
                                    record-id-field={state.config.recordIdField}
                                    onpathconfigured={handlePathConfigured}>
                                </c-ds-path-selector>
                            </template>

                            <!-- Filter Builder -->
                            <template lwc:if={state.config.objectApiName}>
                                <p class="help-text slds-m-bottom_xx-small slds-m-top_small">
                                    Optionally narrow which records to include.
                                </p>
                                <c-ds-filter-builder
                                    object-api-name={state.config.objectApiName}
                                    filters={state.config.filters}
                                    onfilterchange={handleFilterChange}>
                                </c-ds-filter-builder>
                            </template>
                        </div>

                        <!-- Generate Diagram CTA -->
                        <div class="generate-bar slds-m-top_medium slds-text-align_center">
                            <lightning-button
                                label="Generate Diagram"
                                icon-name="utility:play"
                                variant="brand"
                                onclick={handleGenerateDiagram}
                                disabled={isGenerateDisabled}
                                class="generate-btn">
                            </lightning-button>
                            <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                                Builds a Sankey flow diagram from your settings above.
                            </p>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <!-- Error state -->
        <template lwc:if={errorMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-around_medium" role="alert">
                <span class="slds-assistive-text">error</span>
                {errorMessage}
            </div>
        </template>
    </lightning-card>
</template>
